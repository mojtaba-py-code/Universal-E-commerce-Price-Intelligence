services:
  db:
    image: postgres:16-alpine
    container_name: price_intel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-priceintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-priceintel}
      POSTGRES_DB: ${POSTGRES_DB:-priceintel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-priceintel} -d ${POSTGRES_DB:-priceintel}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
